<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="meatGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="60%" stop-color="#C8600A"/>
      <stop offset="100%" stop-color="#8B3A00"/>
    </radialGradient>
    <radialGradient id="boneGrad" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#F5E6C8"/>
      <stop offset="100%" stop-color="#D4B896"/>
    </radialGradient>
  </defs>

  <!-- Bone stick -->
  <rect x="22" y="38" width="9" height="18" rx="4" fill="url(#boneGrad)" transform="rotate(-35 26 47)"/>
  <!-- Bone knob bottom -->
  <circle cx="16" cy="55" r="5" fill="url(#boneGrad)"/>
  <circle cx="11" cy="51" r="3.5" fill="url(#boneGrad)"/>

  <!-- Main meat ball -->
  <circle cx="38" cy="26" r="20" fill="url(#meatGrad)"/>

  <!-- Sauce drips -->
  <path d="M30 44 Q28 50 29 54" stroke="#C8600A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M38 46 Q37 52 38 56" stroke="#C8600A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M46 43 Q48 49 47 52" stroke="#C8600A" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Sesame seed dots -->
  <ellipse cx="30" cy="20" rx="2" ry="1.2" fill="#FFF5E0" opacity="0.9" transform="rotate(-20 30 20)"/>
  <ellipse cx="40" cy="16" rx="2" ry="1.2" fill="#FFF5E0" opacity="0.9" transform="rotate(10 40 16)"/>
  <ellipse cx="48" cy="24" rx="2" ry="1.2" fill="#FFF5E0" opacity="0.9" transform="rotate(-10 48 24)"/>
  <ellipse cx="44" cy="32" rx="2" ry="1.2" fill="#FFF5E0" opacity="0.9" transform="rotate(25 44 32)"/>
  <ellipse cx="32" cy="30" rx="2" ry="1.2" fill="#FFF5E0" opacity="0.9" transform="rotate(-15 32 30)"/>
  <ellipse cx="36" cy="22" rx="1.8" ry="1.1" fill="#FFF5E0" opacity="0.85" transform="rotate(5 36 22)"/>

  <!-- Highlight on meat -->
