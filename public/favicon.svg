<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#050510"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- Cyan ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>

  <!-- JC text -->
  <text
    x="32" y="38"
    text-anchor="middle"
    font-family="Arial, sans-serif"
    font-weight="900"
    font-size="22"
    letter-spacing="1"
    fill="#00d4ff"
    filter="url(#glow)"
  >JC</text>

  <!-- Star accent top-right -->
  <text x="46" y="20" font-size="8" fill="#00d4ff" opacity="0.8" text-anchor="middle">✦</text>
</svg>
